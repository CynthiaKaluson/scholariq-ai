services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: scholariq
      POSTGRES_PASSWORD: scholariq
      POSTGRES_DB: scholariq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: